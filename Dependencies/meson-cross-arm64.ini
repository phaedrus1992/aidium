[binaries]
c = 'clang'
cpp = 'clang++'
ar = 'ar'
strip = 'strip'
objc = 'clang'
objcpp = 'clang++'
pkgconfig = 'pkg-config'

[host_machine]
system = 'darwin'
cpu_family = 'aarch64'
cpu = 'aarch64'
endian = 'little'

[built-in options]
c_args = ['-arch', 'arm64', '-mmacosx-version-min=11.0']
c_link_args = ['-arch', 'arm64', '-mmacosx-version-min=11.0']
cpp_args = ['-arch', 'arm64', '-mmacosx-version-min=11.0']
cpp_link_args = ['-arch', 'arm64', '-mmacosx-version-min=11.0']
