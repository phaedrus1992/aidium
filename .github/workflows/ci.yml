name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-15
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Install xcpretty
        run: sudo gem install xcpretty --no-document --quiet 2>&1 || true

      - name: Build MMTabBarView.framework
        run: |
          xcodebuild -project Dependencies/MMTabBarView/MMTabBarView/MMTabBarView.xcodeproj \
                     -scheme MMTabBarView \
                     -configuration Release \
                     -sdk macosx \
                     CODE_SIGNING_ALLOWED=NO \
                     build 2>&1 | xcpretty

      - name: Copy MMTabBarView.framework
        run: |
          SRC="$(find ~/Library/Developer/Xcode/DerivedData/MMTabBarView-*/Build/Products/Release -name 'MMTabBarView.framework' -type d | head -1)"
          if [ -z "$SRC" ]; then echo "ERROR: MMTabBarView.framework not found in DerivedData"; exit 1; fi
          cp -R "$SRC" Frameworks/MMTabBarView.framework

      - name: Install build tools
        run: brew install meson ninja pkg-config intltool || true

      - name: Cache vendored dependency builds
        id: deps-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            Frameworks/libffi.framework
            Frameworks/libgcrypt.framework
            Frameworks/libgpg-error.framework
            Frameworks/libotr.framework
            Frameworks/libpcre2-8.framework
            Frameworks/libpurple.framework
            Frameworks/libxml2.framework
            Frameworks/glib.framework
            Frameworks/libgio.framework
            Frameworks/libgmodule.framework
            Frameworks/libgobject.framework
            Frameworks/libgthread.framework
            Frameworks/libintl.framework
            Frameworks/FriBidi.framework
            Frameworks/LMX.framework
            Dependencies/build
            Dependencies/.cache
          key: deps-v2-${{ runner.os }}-${{ hashFiles('Dependencies/vendor/**', 'Dependencies/build-common.sh', 'Dependencies/build-phases/**', 'Dependencies/build-universal-deps.sh', 'Dependencies/meson-cross-*.ini') }}
          restore-keys: |
            deps-v2-${{ runner.os }}-

      - name: Build universal dependencies (vendored, no network)
        if: steps.deps-cache.outputs.cache-hit != 'true'
        run: |
          set -o pipefail
          LOG_FILE="$RUNNER_TEMP/build-deps.log"
          echo "--- Restored cached build artifacts, checking per-dependency stamps ---"
          bash Dependencies/build-universal-deps.sh 2>&1 | tee "$LOG_FILE" | tail -40
          echo "log-path=$LOG_FILE" >> "$GITHUB_ENV"

      - name: Upload build log (on failure)
        if: failure() && env.log-path != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: build-deps-log
          path: ${{ env.log-path }}

      - name: Assert universal architectures
        run: |
          set -e
          for fw in libintl libffi libpcre2-8 glib libgmodule libgobject \
                    libgthread libgio libxml2 libgpg-error libgcrypt libotr libpurple; do
            bin="Frameworks/$fw.framework/Versions/A/$fw"
            archs="$(lipo -archs "$bin")"
            echo "$fw: $archs"
            [ "$archs" = "x86_64 arm64" ] || [ "$archs" = "arm64 x86_64" ] || { echo "FAIL: $fw"; exit 1; }
          done
          nm -gU Frameworks/libpurple.framework/Versions/A/libpurple | grep -q ' _purple_core_init'

      - name: Build AIUtilities.framework
        run: |
          set -o pipefail
          xcodebuild -project Frameworks/AIUtilities/AIUtilities.xcodeproj \
                     -target AIUtilities.framework \
                     -configuration Debug \
                     -sdk macosx \
                     CODE_SIGNING_ALLOWED=NO \
                     build 2>&1 | xcpretty

      # AdiumLibpurple, Purple Service, and Adium targets compile
      # against the vendored frameworks. Upstream libpurple 2.14.14
      # is configured with --with-static-prpls=jabber,irc,simple and
      # --disable-plugins. The universal deps pipeline, MMTabBarView,
      # and AIUtilities are built first so they are available.