name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-15
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Install xcpretty
        run: sudo gem install xcpretty --no-document --quiet 2>&1 || true

      - name: Install clang-format
        run: brew install clang-format 2>&1 || true

      - name: Check code style (clang-format dry-run)
        run: |
          make format-check CLANG_FORMAT="$(brew --prefix clang-format)/bin/clang-format"

      - name: Shellcheck build scripts
        run: |
          brew install shellcheck 2>&1 || true
          shellcheck \
            Dependencies/build-common.sh \
            Dependencies/build-universal-deps.sh \
            Dependencies/build-phases/*.sh

      - name: Build MMTabBarView.framework
        run: |
          xcodebuild -project Dependencies/MMTabBarView/MMTabBarView/MMTabBarView.xcodeproj \
                     -scheme MMTabBarView \
                     -configuration Release \
                     -sdk macosx \
                     CODE_SIGNING_ALLOWED=NO \
                     build 2>&1 | xcpretty

      - name: Copy MMTabBarView.framework
        run: |
          SRC="build/Release/MMTabBarView.framework"
          if [ ! -d "$SRC" ]; then echo "ERROR: $SRC not found (SYMROOT set to build/)"; exit 1; fi
          cp -R "$SRC" Frameworks/MMTabBarView.framework

      - name: Install build tools
        run: brew install meson ninja pkg-config intltool || true

      - name: Cache vendored dependency builds
        id: deps-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            Frameworks/libffi.framework
            Frameworks/libgcrypt.framework
            Frameworks/libgpg-error.framework
            Frameworks/libotr.framework
            Frameworks/libpcre2-8.framework
            Frameworks/libpurple.framework
            Frameworks/libxml2.framework
            Frameworks/glib.framework
            Frameworks/libgio.framework
            Frameworks/libgmodule.framework
            Frameworks/libgobject.framework
            Frameworks/libgthread.framework
            Frameworks/libintl.framework
            Frameworks/FriBidi.framework
            Frameworks/LMX.framework
            Dependencies/build
            Dependencies/.cache
          key: deps-v2-${{ runner.os }}-${{ hashFiles('Dependencies/vendor/**', 'Dependencies/build-common.sh', 'Dependencies/build-phases/**', 'Dependencies/build-universal-deps.sh', 'Dependencies/meson-cross-*.ini') }}
          restore-keys: |
            deps-v2-${{ runner.os }}-

      - name: Build universal dependencies (vendored, no network)
        if: steps.deps-cache.outputs.cache-hit != 'true'
        run: |
          set -o pipefail
          LOG_FILE="$RUNNER_TEMP/build-deps.log"
          echo "--- Restored cached build artifacts, checking per-dependency stamps ---"
          bash Dependencies/build-universal-deps.sh 2>&1 | tee "$LOG_FILE" | tail -40
          echo "log-path=$LOG_FILE" >> "$GITHUB_ENV"

      - name: Upload build log (on failure)
        if: failure() && env.log-path != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: build-deps-log
          path: ${{ env.log-path }}

      - name: Assert universal architectures
        run: |
          set -e
          for fw in libintl libffi libpcre2-8 glib libgmodule libgobject \
                    libgthread libgio libxml2 libgpg-error libgcrypt libotr libpurple; do
            bin="Frameworks/$fw.framework/Versions/A/$fw"
            archs="$(lipo -archs "$bin")"
            echo "$fw: $archs"
            [ "$archs" = "x86_64 arm64" ] || [ "$archs" = "arm64 x86_64" ] || { echo "FAIL: $fw"; exit 1; }
          done
          nm -gU Frameworks/libpurple.framework/Versions/A/libpurple | grep -q ' _purple_core_init'

      - name: Build AIUtilities.framework (with coverage instrumentation)
        run: |
          set -o pipefail
          xcodebuild -project Frameworks/AIUtilities/AIUtilities.xcodeproj \
                     -target AIUtilities.framework \
                     -configuration Debug \
                     -sdk macosx \
                     SYMROOT="$PWD/build/DerivedData/Build/Products" \
                     OBJROOT="$PWD/build/DerivedData/Build/Intermediates" \
                     CODE_SIGNING_ALLOWED=NO \
                     CLANG_COVERAGE_MAPPING=YES \
                     CLANG_PROFILE_INSTRUMENTATION=YES \
                     build 2>&1 | xcpretty

      - name: Run smoke tests (CoverageHost)
        run: |
          set -o pipefail
          xcodebuild test \
                     -project Tests/CoverageHost/CoverageHost.xcodeproj \
                     -scheme CoverageHost \
                     -configuration Debug \
                     -sdk macosx \
                     -derivedDataPath build/DerivedData \
                     -enableCodeCoverage YES \
                     CODE_SIGNING_ALLOWED=NO \
                     2>&1 | xcpretty

      - name: Check code coverage threshold
        env:
          COVERAGE_THRESHOLD: 0
          DERIVED_DATA_DIR: build/DerivedData
        run: |
          make coverage-check